locale                   : "en-US"
title                    : "Carmen Pelayo Fernández"
title_separator          : "-"
name                     : "Carmen Pelayo Fernández"
description              : "Economist and data scientist working at the intersection of AI, technology, and economic analysis."
url                      : "https://carmenpelayo.github.io"
baseurl                  : ""
repository               : "carmenpelayo/carmenpelayo.github.io"

# Theme
remote_theme             : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "default"

# Site settings
search                   : false
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "enabled"
talkmap_link             : false

# Author
author:
  name             : "Carmen Pelayo Fernández"
  avatar           : "/images/profile.jpeg"
  bio              : "Economist and data scientist focused on AI, digitization, and applied economic research."
  location         : "Madrid, Spain"
  employer         : "BBVA Research"
  email            : "carmen.pelayo@bbva.com"
  github           : "carmenpelayo"
  linkedin         : "carmenpelayofernandez"

# Reading files
include:
  - _pages
  - files

exclude:
  - vendor
  - .bundle
  - node_modules
  - tmp
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
      related: false

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Madrid

# Plugins
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jemoji
