# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Carmen Pelayo Fernández"
title_separator          : "-"
name                     : "Carmen Pelayo Fernández"
description              : "Economist and data scientist working at the intersection of AI, technology, and economic analysis."
url                      : "https://carmenpelayo.github.io"
baseurl                  : ""
repository               : "carmenpelayo/carmenpelayo.github.io"
teaser                   :
logo                     :
masthead_title           :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "enabled"
talkmap_link             : false
comments:
  provider               : false
atom_feed:
  hide                   : true
search                   : false

# Site Author
author:
  avatar           : "images/profile.jpg"
  name             : "Carmen Pelayo Fernández"
  pronouns         :
  bio              : "Economist and data scientist focused on AI, digitization, and applied economic research."
  location         : "Madrid, Spain"
  employer         : "BBVA Research"
  pubmed           :
  googlescholar    :
  email            : "carmen.pelayo@bbva.com"
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "carmenpelayo"
  google_plus      :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         : "carmenpelayofernandez"
  orcid            :
  pinterest        :
  soundcloud       :
  stackoverflow    :
  steam            :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

# Publication Category
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"
  chapters:
    title: "Book Chapters"

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .bundle
  - node_modules
  - tmp
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
      related: false

# Sass/Assets
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Madrid

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
